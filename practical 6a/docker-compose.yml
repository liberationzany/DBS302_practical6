services:
  redis:
    image: redis:7.2
    container_name: dbs302-practical6a-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./certs/redis:/certs/redis:ro

  mongo:
    image: mongo:7.0
    container_name: dbs302-practical6a-mongo
    command: ["mongod", "--config", "/etc/mongod.conf"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rootAdmin
      MONGO_INITDB_ROOT_PASSWORD: rootStrongPwd
    volumes:
      - mongo-data:/data/db
      - ./mongo/mongod.conf:/etc/mongod.conf:ro
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
      - ./certs/mongo:/certs/mongo:ro

volumes:
  mongo-data:
